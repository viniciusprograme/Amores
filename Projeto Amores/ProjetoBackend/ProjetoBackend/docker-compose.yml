version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
    depends_on:
      - db
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/users/me/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: sqlite3:latest
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    command: ["sqlite3", "/app/db.sqlite3", ".read /dev/null"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web
    profiles:
      - production

volumes:
  db_data:
  media_data:
  static_data: